<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Place | متجرك الإلكتروني</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Cairo';margin:0;background:#f5f5f5}
header{background:#007bff;color:white;padding:20px;text-align:center}
.container{max-width:1000px;margin:20px auto;padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.product{background:white;padding:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);text-align:center}
.product img{width:100%;height:200px;object-fit:cover;border-radius:8px}
.product h3{margin:10px 0}
.price{color:#007bff;font-size:20px;font-weight:bold}
button{background:#28a745;color:white;border:none;padding:10px 20px;border-radius:5px;cursor:pointer;width:100%;font-size:16px}
button:hover{background:#218838}
.cart{position:fixed;top:20px;left:20px;background:#ffc107;padding:10px 20px;border-radius:50px;cursor:pointer;font-weight:bold}
#cartBox{display:none;position:fixed;top:70px;left:20px;background:white;padding:20px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.2);width:300px}
</style>
</head>
<body>
<header>
<h1>🛍️ Your Place</h1>
<p>المنصة المتكاملة للتجارة الإلكترونية</p>
</header>

<div class="cart" onclick="toggleCart()">السلة 🛒 <span id="count">0</span></div>
<div id="cartBox"><h3>سلة المشتريات</h3><div id="cartItems">فاضية</div></div>

<div class="container">
  <div class="product">
    <img src="https://via.placeholder.com/250x200/007bff/fff?text=منتج+1">
    <h3>سماعة لاسلكية</h3>
    <p class="price">350 جنيه</p>
    <button onclick="addToCart('سماعة لاسلكية',350)">أضف للسلة</button>
  </div>
  
  <div class="product">
    <img src="https://via.placeholder.com/250x200/28a745/fff?text=منتج+2">
    <h3>ساعة ذكية</h3>
    <p class="price">800 جنيه</p>
    <button onclick="addToCart('ساعة ذكية',800)">أضف للسلة</button>
  </div>
  
  <div class="product">
    <img src="https://via.placeholder.com/250x200/dc3545/fff?text=منتج+3">
    <h3>باور بانك</h3>
    <p class="price">250 جنيه</p>
    <button onclick="addToCart('باور بانك',250)">أضف للسلة</button>
  </div>
</div>

<script>
let cart=[];
function addToCart(name,price){
  cart.push({name,price});
  document.getElementById('count').innerText=cart.length;
  alert(name+' اتضاف للسلة ✅');
}
function toggleCart(){
  let box=document.getElementById('cartBox');
  box.style.display=box.style.display=='block'?'none':'block';
  let items=document.getElementById('cartItems');
  if(cart.length==0){items.innerHTML='فاضية'}
  else{items.innerHTML=cart.map(p=>p.name+' - '+p.price+' جنيه').join('<br>')}
}
</script>
</body>
</html>
