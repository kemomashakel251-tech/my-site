<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Place | متجرك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Cairo';margin:0;background:#f8f9fa}
header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:30px;text-align:center}
.container{max-width:1100px;margin:30px auto;padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:25px}
.product{background:white;padding:20px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1);text-align:center;transition:0.3s}
.product:hover{transform:translateY(-5px)}
.product img{width:100%;height:220px;object-fit:cover;border-radius:12px}
.price{color:#667eea;font-size:24px;font-weight:bold;margin:10px 0}
button{background:#667eea;color:white;border:none;padding:12px 25px;border-radius:8px;cursor:pointer;width:100%;font-size:16px;font-weight:bold}
button:hover{background:#5568d3}
.cart{position:fixed;top:20px;left:20px;background:#ff6b6b;color:white;padding:12px 25px;border-radius:50px;cursor:pointer;font-weight:bold;z-index:999}
#cartBox{display:none;position:fixed;top:70px;left:20px;background:white;padding:20px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.3);width:320px;z-index:999}
</style>
</head>
<body>
<header>
<h1>🛍️ Your Place</h1>
<p>المنصة المتكاملة للتجارة الإلكترونية</p>
</header>

<div class="cart" onclick="toggleCart()">السلة 🛒 <span id="count">0</span></div>
<div id="cartBox"><h3>سلة المشتريات</h3><div id="cartItems">فاضية</div></div>

<div class="container">
  <div class="product">
    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400">
    <h3>سماعة لاسلكية</h3>
    <p class="price">350 جنيه</p>
    <button onclick="addToCart('سماعة لاسلكية',350)">أضف للسلة</button>
  </div>
  
  <div class="product">
    <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400">
    <h3>ساعة ذكية</h3>
    <p class="price">800 جنيه</p>
    <button onclick="addToCart('ساعة ذكية',800)">أضف للسلة</button>
  </div>
  
  <div class="product">
    <img src="https://images.unsplash.com/photo-1587825140708-dfaf72ae4b04?w=400">
    <h3>باور بانك</h3>
    <p class="price">250 جنيه</p>
    <button onclick="addToCart('باور بانك',250)">أضف للسلة</button>
  </div>
</div>

<script>
let cart=[];
function addToCart(name,price){
  cart.push({name,price});
  document.getElementById('count').innerText=cart.length;
  alert(name+' اتضاف للسلة ✅');
}
function toggleCart(){
  let box=document.getElementById('cartBox');
  box.style.display=box.style.display=='block'?'none':'block';
  let items=document.getElementById('cartItems');
  if(cart.length==0){items.innerHTML='فاضية'}
  else{items.innerHTML=cart.map(p=>p.name+' - '+p.price+' جنيه').join('<br><br>')}
}
</script>
</body>
</html>
